name: Exact Keepalive

on:
  schedule:
    # Dagelijks om 06:30 UTC: pingt Exact Online zodat de refresh_token
    # nooit de 30-dagen inactiviteitsgrens raakt.
    - cron: "30 6 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Ping Exact /Me
        env:
          EXACT_CLIENT_ID: ${{ secrets.EXACT_CLIENT_ID }}
          EXACT_CLIENT_SECRET: ${{ secrets.EXACT_CLIENT_SECRET }}
          EXACT_DIVISION: ${{ secrets.EXACT_DIVISION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_EMAIL: miguel@aiprogression.nl
        working-directory: src
        run: |
          python - <<'PY'
          from exact_client import ExactClient
          c = ExactClient()
          r = c.get("/current/Me?$select=CurrentDivision,FullName")
          print("Keepalive OK:", r[:1] if r else r)
          PY

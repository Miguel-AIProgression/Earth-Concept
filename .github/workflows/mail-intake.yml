name: Mail intake + pipeline

on:
  # Getriggerd door Supabase pg_cron (elke 2 min), die via pg_net een
  # repository_dispatch POST doet. GitHub's eigen schedule-cron is uitgezet:
  # die skipte runs regelmatig 1-3 uur tijdens drukte.
  repository_dispatch:
    types: [mail-intake]
  # Elke merge naar main moet direct een run starten zodat een fix niet
  # hoeft te wachten op de volgende pg_cron-tick.
  push:
    branches: [main]
    paths:
      - "src/**"
      - "requirements.txt"
      - ".github/workflows/mail-intake.yml"
  workflow_dispatch:

concurrency:
  group: mail-pipeline
  cancel-in-progress: false

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
      - run: pip install -r requirements.txt
      - name: Run pipeline (intake + parse + match + POST)
        working-directory: src
        env:
          MAIL_USER: ${{ secrets.MAIL_USER }}
          MAIL_PASS: ${{ secrets.MAIL_PASS }}
          MAIL_HOST: imap.gmail.com
          MAIL_PORT: "993"
          EXACT_CLIENT_ID: ${{ secrets.EXACT_CLIENT_ID }}
          EXACT_CLIENT_SECRET: ${{ secrets.EXACT_CLIENT_SECRET }}
          EXACT_DIVISION: ${{ secrets.EXACT_DIVISION }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          ALERT_EMAIL: miguel@aiprogression.nl
        run: python process_pipeline.py
